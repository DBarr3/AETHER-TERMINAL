<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aether Terminal - Module Matrix</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600&family=Space+Mono:wght@400;700&display=swap');
        
        body { 
            margin: 0; 
            background-color: #030303; 
            overflow: hidden; 
            font-family: 'Inter', sans-serif; 
            color: #ffffff;
            user-select: none;
        }
        
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* Fade partially instead of completely during login */
            transition: opacity 2s ease-in-out; 
            cursor: crosshair;
        }
        
        canvas { display: block; }
        
        /* Info Panel */
        #info { 
            position: absolute; 
            top: 30px; 
            left: 30px; 
            background: rgba(10, 10, 15, 0.85); 
            padding: 20px 25px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.05); 
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            pointer-events: none;
            transition: opacity 1s ease;
            z-index: 10;
        }
        
        h1 { margin: 0 0 5px 0; font-size: 1.1rem; font-weight: 600; letter-spacing: 3px; color: #fff; }
        p { margin: 0; font-size: 0.75rem; color: #888; letter-spacing: 1px; text-transform: uppercase; }
        
        .legend { margin-top: 20px; font-size: 0.7rem; color: #aaa; display: flex; flex-direction: column; gap: 8px; }
        .legend-item { display: flex; align-items: center; gap: 10px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px currentColor; }
        
        /* Terminal Boot Logs */
        #boot-log {
            position: absolute;
            bottom: 30px;
            right: 30px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: #00e5ff;
            text-shadow: 0 0 5px rgba(0, 229, 255, 0.5);
            pointer-events: none;
            text-align: right;
            line-height: 1.6;
            max-width: 400px;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        /* Login Screen */
        #login-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(3, 3, 5, 0.75); /* More transparent to see the matrix backdrop */
            backdrop-filter: blur(8px); /* Minimal blur so stars and lines show through nicely */
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s ease-in-out;
            z-index: 20;
        }

        .login-box {
            background: rgba(10, 12, 18, 0.85);
            padding: 40px 50px;
            border-radius: 16px;
            border: 1px solid rgba(0, 229, 255, 0.3);
            /* Increased blue glow requested */
            box-shadow: 0 0 60px rgba(0, 229, 255, 0.15), inset 0 0 20px rgba(0, 229, 255, 0.1);
            text-align: center;
            width: 320px;
            transform: scale(0.9);
            transition: transform 1s cubic-bezier(0.1, 1, 0.3, 1), box-shadow 0.4s ease, border-color 0.4s ease;
        }
        
        /* Hover state for the AETHER_CORE login modal */
        .login-box:hover {
            border: 1px solid rgba(0, 229, 255, 0.5);
            box-shadow: 0 0 90px rgba(0, 229, 255, 0.25), inset 0 0 30px rgba(0, 229, 255, 0.15);
        }

        .login-box h2 {
            font-family: 'Space Mono', monospace;
            color: #fff;
            letter-spacing: 4px;
            margin: 0 0 30px 0;
            font-size: 1.4rem;
            text-shadow: 0 0 15px rgba(0,229,255,0.4);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            color: #888;
            margin-bottom: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 15px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-group input:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.2);
        }

        button.login-btn {
            width: 100%;
            background: transparent;
            color: #00e5ff;
            border: 1px solid #00e5ff;
            padding: 14px;
            border-radius: 8px;
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
            outline: none;
            transition: all 0.3s ease;
            margin-top: 10px;
            text-transform: uppercase;
        }

        button.login-btn:hover {
            background: rgba(0, 229, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.3);
            text-shadow: 0 0 5px rgba(0,229,255,0.5);
        }

        body.zoomed #login-screen {
            opacity: 1;
            pointer-events: auto;
        }
        
        body.zoomed .login-box {
            transform: scale(1);
        }

        body.zoomed #info {
            opacity: 0;
        }
        
        body.zoomed #canvas-container {
            opacity: 0.5; /* Keeping it semi-transparent so matrix and stars nicely sit behind the login */
            pointer-events: none;
        }

        /* Faux-3D Night Earth mapped directly over the central node */
        #earth-globe {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            /* NASA Black Marble composite — high-res nighttime Earth */
            background: url('https://eoimages.gsfc.nasa.gov/images/imagerecords/79000/79765/dnb_land_ocean_ice.2012.3600x1800.jpg') repeat-x;
            background-size: auto 100%;
            z-index: 15;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>AETHER TERMINAL</h1>
        <p>Core System Architecture Map</p>
        <div class="legend" style="margin-top: 5px; margin-bottom: 20px;">
            <div style="font-size: 0.65rem; color: #00e5ff; text-shadow: 0 0 8px rgba(0,229,255,0.5);">SCROLL or CLICK to initialize zoom</div>
        </div>
        
        <div class="legend">
            <div class="legend-item"><span class="dot" style="color: #ff2a6d; background: #ff2a6d;"></span> Core Modules</div>
            <div class="legend-item"><span class="dot" style="color: #00e5ff; background: #00e5ff;"></span> Central Intelligence</div>
            <div class="legend-item"><span class="dot" style="color: #f9a826; background: #f9a826;"></span> Data Modules</div>
        </div>
    </div>
    
    <div id="boot-log"></div>

    <div id="canvas-container">
        <canvas id="networkCanvas"></canvas>
    </div>
    
    <!-- Immersive Hi-Res Globe overlay -->
    <div id="earth-globe"></div>

    <!-- Login Overlay -->
    <div id="login-screen">
        <div class="login-box">
            <h2>AETHER_CORE</h2>
            <div class="input-group">
                <label>Operator ID</label>
                <input type="text" placeholder="// SYSTEM.ADMIN" autocomplete="off" spellcheck="false">
            </div>
            <div class="input-group">
                <label>Security Key</label>
                <input type="password" placeholder="•••••••••">
            </div>
            <button class="login-btn">Initialize</button>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('networkCanvas');
        const ctx = canvas.getContext('2d');
        const bootLogElement = document.getElementById('boot-log');
        let width, height;

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Specific color grouping mappings
        const redColor = '#ff2a6d';
        const blueColor = '#00e5ff';
        const yellowColor = '#f9a826';
        const hubColor = '#ffffff';

        // ── EARTH RENDERER (Ported from Gods Eye) ──
        function drawNightEarth(c, px, py, r, alpha) {
            c.save(); c.translate(px, py); c.rotate(-performance.now()*0.00015);
            var o = c.createRadialGradient(-r*0.2, -r*0.2, 0, 0, 0, r);
            o.addColorStop(0, 'rgba(10,30,80,' + alpha + ')');
            o.addColorStop(0.7, 'rgba(2,8,25,' + alpha + ')');
            o.addColorStop(1, 'rgba(0,1,5,' + alpha + ')');
            c.beginPath(); c.arc(0, 0, r, 0, Math.PI*2); c.fillStyle = o; c.fill();
            
            c.beginPath(); c.arc(0, 0, r, 0, Math.PI*2); c.clip();
            c.fillStyle = 'rgba(255,230,150,' + (alpha*0.8) + ')';
            
            var CITIES = [
                {a:5.50,lat:0.42,b:0.95,s:2.8},{a:5.52,lat:0.40,b:0.80,s:1.8},{a:5.55,lat:0.44,b:0.85,s:2.2},
                {a:5.60,lat:0.48,b:0.70,s:1.6},{a:5.65,lat:0.52,b:0.75,s:1.9},{a:5.70,lat:0.45,b:0.88,s:2.0},
                {a:5.80,lat:0.55,b:0.72,s:1.8},{a:5.83,lat:0.57,b:0.65,s:1.4},{a:6.00,lat:0.50,b:0.92,s:2.4},
                {a:0.18,lat:0.40,b:0.98,s:2.6},{a:0.20,lat:0.37,b:0.90,s:2.2},{a:0.23,lat:0.38,b:0.85,s:2.0},
                {a:0.25,lat:0.35,b:0.80,s:1.9},{a:0.28,lat:0.36,b:0.75,s:1.8},{a:0.15,lat:0.42,b:0.70,s:1.6},
                {a:0.35,lat:0.32,b:0.70,s:1.8},{a:0.38,lat:0.30,b:0.55,s:1.4},{a:0.55,lat:0.28,b:0.28,s:0.9},
                {a:0.65,lat:0.30,b:0.22,s:0.7},{a:0.38,lat:0.52,b:0.82,s:1.8},{a:0.40,lat:0.50,b:0.70,s:1.5},
                {a:0.48,lat:0.50,b:0.85,s:2.2},{a:0.50,lat:0.52,b:0.75,s:1.8},{a:0.52,lat:0.55,b:0.65,s:1.5},
                {a:0.68,lat:0.52,b:0.78,s:1.8},{a:0.70,lat:0.50,b:0.72,s:1.6},{a:0.72,lat:0.38,b:0.98,s:2.6},
                {a:0.73,lat:0.36,b:0.90,s:2.2},{a:0.74,lat:0.40,b:0.82,s:1.9},{a:0.69,lat:0.37,b:0.88,s:2.0},
                {a:3.10,lat:0.45,b:0.88,s:2.0},{a:3.15,lat:0.48,b:0.92,s:2.5},{a:3.20,lat:0.42,b:0.85,s:1.9},
                {a:3.25,lat:0.40,b:0.75,s:1.6},{a:3.30,lat:0.38,b:0.95,s:2.8},{a:3.35,lat:0.35,b:0.70,s:1.4},
                {a:4.20,lat:0.35,b:0.85,s:2.0},{a:4.25,lat:0.38,b:0.90,s:2.2},{a:4.30,lat:0.32,b:0.75,s:1.5},
                {a:4.40,lat:0.40,b:0.60,s:1.2},{a:4.45,lat:0.42,b:0.80,s:1.8},{a:4.50,lat:0.45,b:0.95,s:2.6}
            ];
            
            for (var ci = 0; ci < CITIES.length; ci++) {
                var city = CITIES[ci];
                var ang = city.a;
                var lat = city.lat * Math.PI - Math.PI/2;
                var lx = r * Math.cos(lat) * Math.cos(ang);
                var ly = r * Math.sin(lat);
                var lz = r * Math.cos(lat) * Math.sin(ang);
                if (lz < 0) continue; 
                var intensity = city.b * (lz/r);
                if (intensity <= 0) continue;
                var lightR = city.s * (r/80);
                var mg = c.createRadialGradient(lx, ly, 0, lx, ly, lightR * 2.5);
                mg.addColorStop(0, 'rgba(255,200,100,' + (intensity*0.75) + ')');
                mg.addColorStop(0.5, 'rgba(255,160,50,' + (intensity*0.40) + ')');
                mg.addColorStop(1, 'transparent');
                c.beginPath(); c.arc(lx, ly, lightR * 2.5, 0, Math.PI*2); c.fillStyle = mg; c.fill();
                c.beginPath(); c.arc(lx, ly, lightR * 0.8, 0, Math.PI*2); c.fillStyle = 'rgba(255,240,200,' + (intensity*0.95) + ')'; c.fill();
            }
            c.restore();
            
            var atm = c.createRadialGradient(px, py, r*0.92, px, py, r*1.22);
            atm.addColorStop(0, 'rgba(20,80,200,' + (alpha*0.65) + ')');
            atm.addColorStop(0.3, 'rgba(50,120,240,' + (alpha*0.38) + ')');
            atm.addColorStop(0.6, 'rgba(80,160,255,' + (alpha*0.18) + ')');
            atm.addColorStop(1, 'transparent');
            c.beginPath(); c.arc(px, py, r*1.22, 0, Math.PI*2); c.fillStyle = atm; c.fill();
            
            var term = c.createRadialGradient(px+r*0.55, py, 0, px+r*0.15, py, r*1.05);
            term.addColorStop(0, 'transparent');
            term.addColorStop(0.4, 'transparent');
            term.addColorStop(0.7, 'rgba(0,2,8,' + (alpha*0.35) + ')');
            term.addColorStop(1, 'rgba(0,1,5,' + (alpha*0.6) + ')');
            c.beginPath(); c.arc(px, py, r, 0, Math.PI*2); c.fillStyle = term; c.fill();
        }

        const centerNode = { id: 'AETHER TERMINAL', group: 'core', radius: 10, x: width/2, y: height/2, color: hubColor, vx: 0, vy: 0, hoverAlpha: 0 };
        
        const rawNodeData = [
            // Central Intelligence (Blue)
            { id: 'LLM Console', group: 'blue', color: blueColor, size: 5 },
            { id: 'ChatGPT', group: 'blue', color: blueColor, size: 4 },
            { id: 'Cognition LLM', group: 'blue', color: blueColor, size: 6 },

            // Data Modules (Yellow)
            { id: 'SEC Filings', group: 'yellow', color: yellowColor, size: 5 },
            { id: 'Econ News', group: 'yellow', color: yellowColor, size: 5 },
            { id: 'Chart Panel', group: 'yellow', color: yellowColor, size: 5 },
            { id: 'Options Pricing', group: 'yellow', color: yellowColor, size: 5 },
            { id: 'News Base', group: 'yellow', color: yellowColor, size: 4 },
            { id: 'Data Loader', group: 'yellow', color: yellowColor, size: 4 },

            // Core Modules (Red)
            { id: 'Options Planner', group: 'red', color: redColor, size: 6 },
            { id: 'Profit Calc', group: 'red', color: redColor, size: 5 },
            { id: 'Supply Chain', group: 'red', color: redColor, size: 5 },
            { id: 'Trade Journal', group: 'red', color: redColor, size: 4 },
            { id: 'Watchlist', group: 'red', color: redColor, size: 4 },
            { id: 'Worldeye', group: 'red', color: redColor, size: 4 },
            { id: 'Calculator', group: 'red', color: redColor, size: 3 },
            { id: 'Ratio Analysis', group: 'red', color: redColor, size: 3 },
            { id: 'Testing Core', group: 'red', color: redColor, size: 3 },
            { id: 'Event Pipeline', group: 'red', color: redColor, size: 5 },
            { id: 'Dock Manager', group: 'red', color: redColor, size: 5 },
            { id: 'Session State', group: 'red', color: redColor, size: 4 },
            { id: 'Global News', group: 'red', color: redColor, size: 3 },
            { id: 'Commodities', group: 'red', color: redColor, size: 3 }
        ];

        const nodesData = [centerNode];
        
        rawNodeData.forEach(data => {
            const angle = Math.random() * Math.PI * 2;
            const dist = 120 + Math.random() * (Math.min(width, height)/2.2);
            nodesData.push({
                ...data,
                x: width/2 + Math.cos(angle) * dist,
                y: height/2 + Math.sin(angle) * dist,
                radius: data.size,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4,
                angleOffset: angle,
                distOffset: dist
            });
        });

        const links = [];
        nodesData.forEach(n => {
            if (n !== centerNode) {
                // Central beam connection
                links.push({ source: centerNode, target: n, isCore: true });
                
                // Neighbor grouping connections (true matrix web)
                nodesData.forEach(other => {
                    if (n !== other && other !== centerNode) {
                        const dist = Math.hypot(n.x - other.x, n.y - other.y);
                        // Thinner, sparser web linking closer tiles
                        if (dist < 150 && Math.random() > 0.85) {
                            links.push({ source: n, target: other, isCore: false });
                        }
                    }
                });
            }
        });

        // Background Particles (Stars)
        const particles = [];
        for(let i=0; i<150; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                size: Math.random() * 1.5,
                vx: (Math.random() - 0.5) * 0.2, // Slower, minimal drift
                vy: (Math.random() - 0.5) * 0.2,
                alpha: Math.random() * 0.6 + 0.1 // Brighter particles
            });
        }

        let mouse = { x: width/2, y: height/2, isActive: false };
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
            
            const dx = centerNode.x - mouse.x;
            const dy = centerNode.y - mouse.y;
            if(Math.sqrt(dx*dx + dy*dy) < 50) {
                mouse.isActive = true;
            } else {
                mouse.isActive = false;
            }
        });

        let camera = { x: width/2, y: height/2, zoom: 1, targetZoom: 1 };
        let isBooting = false;
        
        const bootMessages = [
            "SYS_BOOT // AETHER KERNEL V4.2.0",
            "Establishing IPC pipeline...",
            ">> SUCCESS: Event Pipeline active",
            "Mounting Cognition Core...",
            "Loading local LLM checkpoints...",
            ">> LOADED: LLM Dispatcher",
            "Connecting secure data models...",
            "Initializing Options matrix...",
            "Validating SEC connections...",
            "SYS_READY // Awaiting Operator Login"
        ];
        
        function typeBootLog() {
            bootLogElement.style.opacity = '1';
            let index = 0;
            bootLogElement.innerHTML = '';
            
            const interval = setInterval(() => {
                if (index < bootMessages.length) {
                    const line = document.createElement('div');
                    line.textContent = bootMessages[index];
                    bootLogElement.appendChild(line);
                    index++;
                } else {
                    clearInterval(interval);
                    setTimeout(() => {
                        document.body.classList.add('zoomed');
                        // Loop reset after 2 seconds on login screen
                        setTimeout(resetTerminal, 2000);
                    }, 800);
                }
            }, 300);
        }

        function resetTerminal() {
            document.body.classList.remove('zoomed');
            camera.targetZoom = 1;
            // Immediate zoom reset for loop feel or smooth? Let's go smooth
            setTimeout(() => {
                isBooting = false;
                bootLogElement.style.opacity = '0';
                bootLogElement.innerHTML = '';
            }, 2000); // match body transition
        }

        function triggerZoom() {
            if (isBooting) return;
            isBooting = true;
            camera.targetZoom = 15;
            typeBootLog();
        }

        window.addEventListener('wheel', (e) => {
            if (e.deltaY < 0 && !isBooting) triggerZoom();
        });

        document.getElementById('canvas-container').addEventListener('click', () => {
            triggerZoom();
        });

        function draw() {
            // Smooth zoom easing
            camera.zoom += (camera.targetZoom - camera.zoom) * 0.04;

            ctx.setTransform(1, 0, 0, 1, 0, 0);
            // During Boot Login, keep background pleasantly dark with slight trace
            ctx.fillStyle = isBooting ? `rgba(3, 3, 5, ${Math.min(0.5 + (camera.zoom / 30), 1)})` : 'rgba(3, 3, 5, 0.25)';
            ctx.fillRect(0, 0, width, height);

            ctx.translate(width/2, height/2);
            ctx.scale(camera.zoom, camera.zoom);
            ctx.translate(-width/2, -height/2);

            centerNode.x = width/2;
            centerNode.y = height/2;

            if (mouse.isActive && !isBooting) {
                centerNode.hoverAlpha = Math.min(centerNode.hoverAlpha + 0.1, 0.4);
            } else {
                centerNode.hoverAlpha = Math.max(centerNode.hoverAlpha - 0.05, 0);
            }

            if (centerNode.hoverAlpha > 0) {
                ctx.beginPath();
                ctx.arc(centerNode.x, centerNode.y, centerNode.radius * 2.5, 0, Math.PI*2);
                ctx.fillStyle = `rgba(0, 229, 255, ${centerNode.hoverAlpha})`; // Subtly tinted the inner ring glow to blue cyan
                ctx.fill();
            }

            // Particles (Stars)
            particles.forEach(p => {
                // If we are zooming/booting, reduce particle drift relative to massive scale so they feel distant
                p.x += p.vx / Math.max(1, camera.zoom);
                p.y += p.vy / Math.max(1, camera.zoom);
                if (p.x < 0) p.x = width; if (p.x > width) p.x = 0;
                if (p.y < 0) p.y = height; if (p.y > height) p.y = 0;
                
                // De-scale particle size so stars remain sharp dots even at 15x matrix zoom
                const pSize = p.size / camera.zoom;
                
                ctx.fillStyle = `rgba(255,255,255,${p.alpha})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, pSize, 0, Math.PI*2);
                ctx.fill();
            });

            const speedMultiplier = isBooting ? 0.3 : 1;

            nodesData.forEach(n => {
                if (n !== centerNode) {
                    n.angleOffset += (0.0005 * speedMultiplier) * (n.distOffset > 250 ? 1 : -1);
                    const targetX = width/2 + Math.cos(n.angleOffset) * n.distOffset;
                    const targetY = height/2 + Math.sin(n.angleOffset) * n.distOffset;
                    
                    n.vx += (targetX - n.x) * (0.0004 * speedMultiplier);
                    n.vy += (targetY - n.y) * (0.0004 * speedMultiplier);

                    // Float organically away from mouse point
                    if (!isBooting) {
                        const scaledMouseX = (mouse.x - width/2) / camera.zoom + width/2;
                        const scaledMouseY = (mouse.y - height/2) / camera.zoom + height/2;
                        
                        const dxMouse = n.x - scaledMouseX;
                        const dyMouse = n.y - scaledMouseY;
                        const distMouse = Math.sqrt(dxMouse*dxMouse + dyMouse*dyMouse);
                        if (distMouse < 120 / camera.zoom) {
                            n.vx += dxMouse * 0.0005;
                            n.vy += dyMouse * 0.0005;
                        }
                    }

                    n.vx *= 0.96;
                    n.vy *= 0.96;
                    n.x += n.vx;
                    n.y += n.vy;
                }
            });

            const linkAlphaCore = Math.max(0, 0.15 - ((camera.zoom - 1) * 0.015));
            const linkAlphaOuter = Math.max(0, 0.05 - ((camera.zoom - 1) * 0.008));

            links.forEach(link => {
                if(linkAlphaOuter <= 0 && !link.isCore) return;
                
                ctx.beginPath();
                ctx.moveTo(link.source.x, link.source.y);
                ctx.lineTo(link.target.x, link.target.y);
                
                // Extremely thin web lines
                if (link.isCore) {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${linkAlphaCore})`;
                    ctx.lineWidth = 0.2 / camera.zoom;
                } else {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${linkAlphaOuter})`;
                    ctx.lineWidth = 0.1 / camera.zoom;
                }
                ctx.stroke();
            });

            nodesData.forEach(n => {
                // Dim down non-central nodes deeply during zoom
                if (isBooting && camera.zoom > 3 && n !== centerNode) {
                    ctx.globalAlpha = Math.max(0, 1 - (camera.zoom - 3) * 0.2);
                } else {
                    ctx.globalAlpha = 1;
                }

                // Central Node Text Logic & Faux-3D Earth synchronization
                let earthScale = 0;
                let actualPixels = 0;
                const earthGlobe = document.getElementById('earth-globe');
                
                if (n === centerNode) {
                    if (isBooting && camera.zoom > 1.5) {
                        earthScale = Math.min(1, (camera.zoom - 1.5) / 8); 
                    }
                    
                    let baseRadius = n.radius / Math.max(1, camera.zoom * 0.1);
                    if (earthScale < 1) {
                        ctx.fillStyle = `rgba(255,255,255,${1 - earthScale})`; 
                        ctx.shadowBlur = (20 + (n.hoverAlpha * 40)) / camera.zoom; 
                        ctx.shadowColor = '#00e5ff';
                        ctx.beginPath();
                        ctx.arc(n.x, n.y, baseRadius, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                    
                    if (earthScale > 0) {
                        actualPixels = (baseRadius + (camera.zoom * 8 * earthScale / camera.zoom)) * camera.zoom * 2;
                        earthGlobe.style.width = actualPixels + 'px';
                        earthGlobe.style.height = actualPixels + 'px';
                        earthGlobe.style.opacity = isBooting ? Math.max(0, earthScale) : 0;
                        
                        // Multi-layer spherical shading for NASA Black Marble realism
                        let sh1 = actualPixels * 0.18;  // Deep terminator shadow
                        let sh2 = actualPixels * 0.06;   // Subtle highlight rim
                        let outerGlow = actualPixels * 0.35;
                        let hoverPulse = 0.15 + n.hoverAlpha * 0.6;
                        
                        earthGlobe.style.boxShadow = [
                            // Deep terminator shadow (right side darkness)
                            `inset -${sh1}px -${sh1*0.6}px ${sh1*3}px rgba(0,0,0,0.95)`,
                            // Secondary terminator for depth
                            `inset -${sh1*0.5}px 0px ${sh1*2}px rgba(0,2,8,0.7)`,
                            // Subtle blue atmospheric scatter on lit side
                            `inset ${sh2}px ${sh2}px ${sh2*4}px rgba(20,60,180,0.25)`,
                            // Outer atmospheric blue glow
                            `0 0 ${outerGlow*0.6}px rgba(30,80,200,${hoverPulse})`,
                            `0 0 ${outerGlow}px rgba(0,229,255,${hoverPulse * 0.4})`
                        ].join(', ');
                        
                        let spin = -performance.now() * 0.004;
                        earthGlobe.style.backgroundPosition = `${spin}px 0`;
                    } else {
                        earthGlobe.style.opacity = 0;
                    }
                    
                    // Render Hover-Synced Typography 
                    if (isBooting) {
                        const renderFontSize = 14 / camera.zoom; 
                        
                        ctx.shadowBlur = (15 + (n.hoverAlpha * 50)) / camera.zoom;
                        ctx.shadowColor = '#00e5ff';
                        
                        ctx.fillStyle = 'rgba(255,255,255,1)';
                        ctx.font = `600 ${renderFontSize}px Inter`;
                        ctx.textAlign = 'center';
                        ctx.letterSpacing = `${3/camera.zoom}px`; 
                        
                        let verticalOffset = (actualPixels / 2 + 35) / camera.zoom;
                        ctx.fillText(n.id, n.x, n.y - verticalOffset);
                    } else {
                        ctx.shadowBlur = (10 + (n.hoverAlpha * 40)) / camera.zoom; 
                        ctx.shadowColor = '#00e5ff';
                        ctx.fillStyle = '#ffffff';
                        ctx.font = `600 12px Inter`; 
                        ctx.textAlign = 'center';
                        ctx.letterSpacing = '1px';
                        ctx.fillText(n.id, n.x, n.y - 20);
                    }
                    ctx.shadowBlur = 0;
                } else {
                    ctx.shadowBlur = 6 / camera.zoom; 
                    ctx.shadowColor = n.color; 
                    
                    ctx.fillStyle = n.color;
                    ctx.beginPath();
                    ctx.arc(n.x, n.y, n.radius / (isBooting ? 1 : Math.max(1, camera.zoom * 0.1)), 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    
                    // Node labels for non-center nodes
                    if (camera.zoom < 3) {
                        ctx.fillStyle = 'rgba(255,255,255,0.7)';
                        ctx.font = `300 9px Inter`;
                        ctx.textAlign = 'center';
                        ctx.fillText(n.id, n.x, n.y + n.radius + 12);
                    }
                }
                
                ctx.globalAlpha = 1; // restore
            });

            requestAnimationFrame(draw);
        }
        
        draw();
    </script>
</body>
</html>
